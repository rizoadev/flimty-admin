<body class="bg-surface soft-bg-gradient min-h-screen flex flex-col">
<!-- Suppression of Shell: TopAppBar & Footer hidden for focused transactional flow -->
<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-[480px]">
<!-- Logo & Header Section -->
<div class="text-center mb-10">
<img alt="Flimty Logo" class="h-16 mx-auto mb-6" data-alt="clean minimalist emerald green brand logo for a health and wellness botanical company with architectural precision" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKauq27U9PpIkZ-EQNByK01bgUqT0J9PvUL-wZIoA821KyCxbo-9m80bJolFLtvBbazUKgf7c0DhHyNYo48o7J0Y062nL_uq5J16CZbudjayR_SRHVvuHkPUHJnCh7AAUAcOJNxEu93AsB6vJE0dafrsrLHhnGWXXCJaLr6EidAj9arhHYrlUS6vqwJqUcUBOLCLC3suIZLaJmCc5ob8yilWAw20HDxHgpMZ-Qq_tbezB659h98JydPiQxFSJaLIrXVdzPOEbtCpY"/>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Join the Sanctuary</h1>
<p class="text-on-surface-variant font-body text-base">Begin your journey with Flimty Botanical Architect today.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0px_12px_32px_rgba(43,51,60,0.06)]">
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant ml-1">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all active:scale-[0.99]" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all active:scale-[0.99]" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Password -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all active:scale-[0.99]" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-wider text-on-surface-variant ml-1">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">enhanced_encryption</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all active:scale-[0.99]" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" id="terms" type="checkbox"/>
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                            I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Primary Action -->
<button class="w-full primary-gradient text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-surface-container-high text-center">
<p class="text-on-surface-variant text-sm">
                        Already have an account? 
                        <a class="text-primary font-bold ml-1 hover:underline active:opacity-70 transition-opacity" href="#">Login</a>
</p>
</div>
</div>
<!-- Secondary Decorative Elements -->
<div class="mt-12 flex justify-center items-center gap-8 opacity-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Secure SSL</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Botanical Foundation</span>
</div>
</div>
</div>

<footer class="w-full py-6 text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">
