<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #2a6c2c 0%, #1d5f21 100%);
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.8);
        }
        .ambient-shadow {
            box-shadow: 0px 12px 32px rgba(43, 51, 60, 0.06);
        }
    </style>

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Header (Now part of the centered flow) -->
<header class="mb-12 flex justify-center items-center">
<img alt="Flimty Logo" class="h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uh-wjZKE9hqU7S9qZIgozjSgaPCTFSazFhgmFhJ4tSRXiyG_-MzGrfo_QwgMeT_6ONG5gOggaChF1Woa8orvSigIQU-GyyqWIWM6_P-qlIMEyUFtmAqjgY94A9CC-qylw2MhvS2Ir1pQr_yg8tnXtmmHnX3Ot10EJdoRm7DxEwXTX8cXaJCbP9hTmGlg0_GnpRDVLK8AVTcT2G9yBUEnLY6C81FPUFiBlLb-sgEbvmjZOFJva426e1haaIBBQvN-oFg1tbu2UlBiA"/>
</header>
<!-- Main Form Card -->
<section class="w-full bg-surface-container-lowest rounded-3xl p-8 md:p-10 ambient-shadow flex flex-col gap-8">
<div class="space-y-3">
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tighter leading-tight">
                    Reset Password
                </h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                    Enter the email address associated with your account and we'll send you a link to reset your password.
                </p>
</div>
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Input Group -->
<div class="space-y-2">
<label class="font-label text-[10px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest rounded-xl border-none ring-2 ring-transparent focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline-variant font-medium" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- CTA Button -->
<button class="primary-gradient text-white h-14 rounded-xl font-headline font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 group" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="flex flex-col items-center pt-2">
<a class="flex items-center gap-2 text-primary font-semibold hover:bg-primary-container/30 px-4 py-2 rounded-lg transition-colors group" href="/login">
<span class="material-symbols-outlined text-lg" data-icon="keyboard_backspace">keyboard_backspace</span>
<span>Back to Login</span>
</a>
</div>
</section>
<!-- Aesthetic Decoration / Info Chips -->
<div class="mt-12 flex flex-wrap justify-center gap-3">
<div class="bg-surface-container-high px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-secondary-fixed-variant">Secure Authentication</span>
</div>
<div class="bg-tertiary-container px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="support_agent">support_agent</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-tertiary-container">Help Center</span>
</div>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed -bottom-20 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed top-20 right-20 w-64 h-64 bg-tertiary/5 rounded-full blur-[100px] -z-10"></div>
<!-- Footer Copyright (Fixed to bottom) -->
<footer class="fixed bottom-8 py-0 text-on-surface-variant/60 text-xs font-medium tracking-tight">
        © 2024 Botanical Architect • Urban Conservatory Management
    </footer>
</body></html>
